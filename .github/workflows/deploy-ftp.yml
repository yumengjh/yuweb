name: CD 部署（FTP）

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-ftp-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 20

jobs:
  deploy-ftp:
    name: 部署到 FTP
    runs-on: ubuntu-latest
    environment: production-ftp

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: 安装 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: 解析产物目录
        run: echo "BUILD_OUTPUT_DIR=${BUILD_OUTPUT_DIR:-out}" >> "$GITHUB_ENV"
        env:
          BUILD_OUTPUT_DIR: ${{ vars.BUILD_OUTPUT_DIR }}

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 生产构建
        run: pnpm build

      - name: 上传到 FTP 服务器
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT || 21 }}
          protocol: ${{ secrets.FTP_PROTOCOL || 'ftp' }}
          local-dir: ${{ env.BUILD_OUTPUT_DIR }}/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
